name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Python setuptools (for better-sqlite3 native build)
        run: sudo apt-get install -y python3-setuptools

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for host Node.js
        run: npm rebuild better-sqlite3

      - name: Type check (main/preload)
        run: npm run typecheck:node

      - name: Type check (renderer)
        run: npm run typecheck:web

      - name: Run unit tests
        run: npm test

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
